spring.application.name=ecommerce-cart-service

spring.datasource.url=jdbc:mysql://localhost:3306/cartService
spring.datasource.username=cartServiceUser
#spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=5000

jwt.secret=e+4GyEUY2A7k4r1TtEXBFCTg/u0SRs/e9WIdpee2FAE=

product.service.url = http://localhost:8080
inventory.service.url = http://localhost:8070

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.productService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.productService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.productService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.productService.waitDurationInOpenState=10s

# Resilience4j Retry
resilience4j.retry.instances.productService.maxAttempts=3
resilience4j.retry.instances.productService.waitDuration=500ms

server.port=8060